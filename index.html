<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aqua Fish Farm Rajahmundry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
  background-color: #f0f8ff;
  font-family: Arial;
}

.welcome-section {
  height: 100vh;
  background: url('back.gif') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}

.cards-section, .category-section {
  display: none;
  padding: 3rem;
}

.category-card {
  background: white;
  padding: 2rem;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.category-card:hover {
  transform: scale(1.05);
}

.ex-item-card {
  background: white;
  padding: 1rem;
  border-radius: 12px;
}

.ex-image {
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.fixed-cart-btn {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: green;
  color: white;
  padding: 10px 25px;
  border-radius: 30px;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- WELCOME -->
<div class="welcome-section" id="welcome">
  <h1>Aqua Fish Farm Rajahmundry</h1>
  <button class="btn btn-light mt-3" onclick="showCategories()">Explore More</button>
</div>

<!-- CATEGORY SECTION -->
<div class="container category-section" id="categories">
  <h2 class="text-center mb-4">Categories</h2>

  <div class="row text-center">
    <div class="col-md-4 mb-3">
      <div class="category-card" onclick="loadCategory('dry')">Dry Items</div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="category-card" onclick="loadCategory('live')">Live</div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="category-card" onclick="loadCategory('feed')">Feed</div>
    </div>
  </div>
</div>

<!-- ITEMS -->
<div class="container cards-section" id="cards">
  <h2 class="text-center mb-4" id="categoryTitle"></h2>
  <div class="row" id="fishCards"></div>

  <div class="text-center mt-3">
    <button class="btn btn-secondary" onclick="goBack()">Back</button>
  </div>

  <a href="cart.html" class="fixed-cart-btn">View Cart</a>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("fishCart")) || [];

function showCategories(){
  document.getElementById("welcome").style.display = "none";
  document.getElementById("categories").style.display = "block";
}

function goBack(){
  document.getElementById("cards").style.display = "none";
  document.getElementById("categories").style.display = "block";
}

const fishList = [

/* LIVE */
{ name:"Mixed Guppy", price:60, img:"mixedguppy.jpg", category:"live" },
{ name:"Japanese Blue Tail", price:500, img:"japanese.jpg", category:"live" },
{ name:"Coin Plant", price:100, img:"coin.jpg", category:"live" },
{ name:"Foxtail", price:50, img:"foxtale.jpg", category:"live" },

/* DRY */
{ name:"Baby Nets", price:100, img:"nets.jpg", category:"dry" },
{ name:"Moina Net", price:100, img:"moina.jpg", category:"dry" },
{ name:"Stress Cure", price:150, img:"stress.jpg", category:"dry" },
{ name:"Blue Cure", price:40, img:"bluecure.jpg", category:"dry" },

/* FEED */
{ name:"Betta Feed", price:200, img:"Betta.jpg", category:"feed" },
{ name:"Artemia Flakes", price:250, img:"artemiafalkes.jpg", category:"feed" },
{ name:"Community Formula", price:100, img:"community.jpg", category:"feed" }

];

function loadCategory(type){

  document.getElementById("categories").style.display = "none";
  document.getElementById("cards").style.display = "block";

  const container = document.getElementById("fishCards");
  container.innerHTML = "";

  document.getElementById("categoryTitle").innerText =
    type.charAt(0).toUpperCase() + type.slice(1) + " Items";

  const filtered = fishList.filter(item => item.category === type);

  filtered.forEach((item, index) => {

    const card = document.createElement("div");
    card.className = "col-md-3 mb-4";

    card.innerHTML = `
      <div class="ex-item-card text-center">
        <img src="${item.img}" class="ex-image w-100 mb-2"/>
        <h5>${item.name}</h5>
        <p>₹${item.price}</p>

        <button class="btn btn-primary" onclick="addToCart(${index})">
          Add to Cart
        </button>
      </div>
    `;

    container.appendChild(card);
  });
}

function addToCart(index){
  const item = fishList[index];

  const exists = cart.find(i => i.name === item.name);
  if(exists){
    alert("Already added!");
    return;
  }

  cart.push({...item, quantity:1});
  localStorage.setItem("fishCart", JSON.stringify(cart));

  alert("Added to cart!");
}

</script>

</body>
</html>
