<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart – Aqua Fish Farm</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --teal: #0d6e6e;
      --teal-light: #1a9090;
      --teal-dark: #084f4f;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --cream: #faf7f2;
      --deep: #0a1628;
      --surface: #ffffff;
      --text: #1a2336;
      --text-muted: #6b7a8d;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    /* ── Header ── */
    .cart-header {
      background: var(--teal-dark);
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
    }

    .header-left .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: white;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.8);
      font-size: 0.82rem;
      font-weight: 500;
      text-decoration: none;
      padding: 7px 16px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      transition: all 0.2s;
    }

    .back-link:hover { background: rgba(255,255,255,0.12); color: white; }

    /* ── Main ── */
    .cart-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 8rem;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--teal-dark);
      margin-bottom: 0.25rem;
    }

    .page-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    /* ── Cart Item ── */
    .cart-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.1rem;
      margin-bottom: 0.85rem;
      transition: box-shadow 0.2s;
    }

    .cart-item:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); }

    .item-img {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .item-unit-price {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
.item-total {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--teal-dark);
}

    .qty-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      line-height: 1;
    }

    .qty-btn:hover { border-color: var(--teal); color: var(--teal); background: #e6f4f4; }

    .qty-num {
      min-width: 22px;
      text-align: center;
      font-weight: 600;
      font-size: 0.88rem;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.6;
      padding: 0;
      transition: opacity 0.2s;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .remove-btn:hover { opacity: 1; }

    /* ── Empty ── */
    .empty-cart {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }

    .empty-cart .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-cart h3 { font-family: 'Playfair Display', serif; color: var(--teal-dark); margin-bottom: 0.5rem; }

    /* ── Order Summary ── */
    .order-summary {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem;
      margin-top: 1.5rem;
    }

    .summary-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--teal-dark);
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.85rem;
    }

    .summary-row .label { color: var(--text-muted); }
    .summary-row .value { font-weight: 600; }

    .summary-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    .grand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .grand-label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .grand-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--teal);
    }

    /* ── Fixed Bottom ── */
    .fixed-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }

    .grand-display {
      display: flex;
      flex-direction: column;
    }

    .grand-display .lbl { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }
    .grand-display .amt {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--teal-dark);
    }

    .confirm-btn {
      background: linear-gradient(135deg, #25d366, #1da851);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 20px rgba(37,211,102,0.3);
      transition: all 0.2s;
    }

    .confirm-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,0.4); }

    .confirm-btn svg { width: 18px; height: 18px; }

    @media (max-width: 480px) {
      .cart-item { flex-wrap: wrap; }
      .item-right { flex-direction: row; align-items: center; width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="cart-header">
  <div class="header-left">
    <img src="logo.jpg" alt="logo" />
    <span class="brand">Aqua Fish Farm</span>
  </div>
  <a href="index.html" class="back-link" onclick="localStorage.setItem('showCards','true')">← Back to Shop</a>
</div>

<!-- Cart Content -->
<div class="cart-container">
  <h1 class="page-title">Your Cart</h1>
  <p class="page-subtitle" id="pageSubtitle">Loading items…</p>

  <div id="cartList"></div>

  <div class="order-summary" id="orderSummary" style="display:none;">
    <div class="summary-title">Order Summary</div>
    <div id="summaryItems"></div>
    <hr class="summary-divider"/>
    <div class="grand-row">
      <span class="grand-label">Grand Total</span>
      <span class="grand-value" id="summaryTotal">₹0</span>
    </div>
  </div>
</div>

<!-- Fixed Bottom Bar -->
<div class="fixed-bottom-bar" id="bottomBar" style="display:none;">
  <div class="grand-display">
    <span class="lbl">Grand Total</span>
    <span class="amt" id="bottomTotal">₹0</span>
  </div>
  <button class="confirm-btn" onclick="confirmOrder()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm0 22C6.486 22 2 17.514 2 12S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
    Order via WhatsApp
  </button>
</div>

<script>
  let cartData = JSON.parse(localStorage.getItem("fishCart")) || [];

  function renderCart() {
    const listEl = document.getElementById("cartList");
    const subtitleEl = document.getElementById("pageSubtitle");
    const summaryEl = document.getElementById("orderSummary");
    const bottomBar = document.getElementById("bottomBar");

    if (cartData.length === 0) {
      listEl.innerHTML = `
        <div class="empty-cart">
          <div class="icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p style="margin-top:0.5rem;">Go back and add some amazing fish!</p>
        </div>`;
      subtitleEl.textContent = "No items yet";
      summaryEl.style.display = "none";
      bottomBar.style.display = "none";
      return;
    }

    let total = 0;
    listEl.innerHTML = cartData.map((item, i) => {
      const itemTotal = item.price * item.quantity;
      total += itemTotal;
      return `
        <div class="cart-item">
          <img src="${item.img}" alt="${item.name}" class="item-img"/>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-unit-price">₹${item.price} per unit</div>
          </div>
          <div class="item-right">
            <span class="item-total">₹${itemTotal}</span>
            <div class="qty-row">
              <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
              <span class="qty-num">${item.quantity}</span>
              <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem(${i})">✕ Remove</button>
          </div>
        </div>`;
    }).join("");

    const count = cartData.reduce((s,i) => s+i.quantity, 0);
    subtitleEl.textContent = `${count} item${count !== 1 ? "s" : ""} in your cart`;

    // Summary
    document.getElementById("summaryItems").innerHTML = cartData.map(item =>
      `<div class="summary-row">
        <span class="label">${item.name} × ${item.quantity}</span>
        <span class="value">₹${item.price * item.quantity}</span>
      </div>`
    ).join("");
    document.getElementById("summaryTotal").textContent = `₹${total}`;
    document.getElementById("bottomTotal").textContent = `₹${total}`;

    summaryEl.style.display = "block";
    bottomBar.style.display = "flex";
  }

  function changeQty(index, delta) {
    cartData[index].quantity += delta;
    if (cartData[index].quantity <= 0) cartData.splice(index, 1);
    localStorage.setItem("fishCart", JSON.stringify(cartData));
    renderCart();
  }

  function removeItem(index) {
    cartData.splice(index, 1);
    localStorage.setItem("fishCart", JSON.stringify(cartData));
    renderCart();
  }

  function confirmOrder() {
    if (cartData.length === 0) { alert("Your cart is empty!"); return; }
    let message = "🐟 *Aqua Fish Farm – New Order*%0A%0A";
    cartData.forEach(item => {
      message += `• ${item.name} × ${item.quantity} = ₹${item.price * item.quantity}%0A`;
    });
    const total = cartData.reduce((s,i) => s + i.price * i.quantity, 0);
    message += `%0A*Grand Total: ₹${total}*%0A%0APlease confirm my order. Thank you! 🙏`;
    window.open(`https://wa.me/918887041756?text=${message}`, "_blank");
  }

  renderCart();
</script>
</body>
</html>
